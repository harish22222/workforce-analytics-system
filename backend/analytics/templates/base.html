<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workforce Analytics System</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --background: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--background);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            padding: 1.5rem;
            background: var(--card-bg);
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            text-align: center;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
            background: linear-gradient(to right, var(--primary), #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            width: 90%;
            max-width: 600px;
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 1rem;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-group {
            margin-bottom: 1.25rem;
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        input {
            padding: 0.75rem 1rem;
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            font-size: 1rem;
            transition: all 0.2s;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
        }

        .grid-7 {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 0.5rem;
        }

        .grid-7 input {
            text-align: center;
            padding: 0.5rem;
        }

        button {
            width: 100%;
            padding: 0.875rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-top: 1rem;
        }

        button:hover {
            background: var(--primary-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        .result-box {
            margin-top: 1.5rem;
            padding: 1.5rem;
            border-radius: 0.75rem;
            background: #f1f5f9;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--border);
        }

        .result-row:last-child {
            border-bottom: none;
        }

        .badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .badge.ok {
            background: #dbfafe;
            color: #047857;
        }

        .badge.violation {
            background: #fee2e2;
            color: #b91c1c;
        }

        .badge.low {
            background: #dcfce7;
            color: #15803d;
        }

        .badge.medium {
            background: #fef9c3;
            color: #a16207;
        }

        .badge.high {
            background: #fee2e2;
            color: #b91c1c;
        }

        .loading {
            text-align: center;
            color: var(--primary);
            font-weight: 500;
            margin-top: 2rem;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: .5;
            }
        }

        /* Dashboard Styles */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
            width: 95%;
            max-width: 1200px;
            margin-bottom: 2rem;
            animation: fadeIn 0.5s ease-out;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 1.75rem;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .stat-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        }

        .stat-label {
            font-size: 0.875rem;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.025em;
        }

        .stat-value {
            font-size: 2.25rem;
            font-weight: 800;
            margin-top: 0.5rem;
            color: var(--text-main);
        }

        .stat-card.risk-high {
            background: linear-gradient(135deg, #fff 0%, #fff1f1 100%);
            border-top: 4px solid var(--danger);
        }

        .stat-card.compliance-violation {
            background: linear-gradient(135deg, #fff 0%, #fffbeb 100%);
            border-top: 4px solid var(--warning);
        }

        .stat-card.total-analyses {
            background: linear-gradient(135deg, #fff 0%, #f5f3ff 100%);
            border-top: 4px solid var(--primary);
        }

        .stat-card.completed-jobs {
            background: linear-gradient(135deg, #fff 0%, #f0fdf4 100%);
            border-top: 4px solid var(--success);
        }

        .dashboard-actions {
            margin-top: 1rem;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            padding: 1rem 2.5rem;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 0.75rem;
            font-weight: 700;
            transition: all 0.2s;
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.4);
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: scale(1.02);
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.5);
        }

        /* Navbar Styles */
        nav {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }

        nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.875rem;
            transition: color 0.2s;
        }

        nav a:hover {
            color: var(--primary);
        }

        .user-info {
            position: absolute;
            top: 1rem;
            right: 2rem;
            font-size: 0.875rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .user-info strong {
            color: var(--text-main);
        }
    </style>
</head>

<body>
    <header>
        {% if user.is_authenticated %}
        <div class="user-info">
            <span>Signed in as <strong>{{ user.username }}</strong></span>
        </div>
        {% endif %}

        <h1>Workforce Analytics & Risk Assessment</h1>

        {% if user.is_authenticated %}
        <nav>
            <a href="{% url 'dashboard' %}">Dashboard</a>
            <a href="{% url 'input-page' %}">Analyse</a>
            <a href="{% url 'history' %}">History</a>
            <a href="{% url 'logout' %}">Logout</a>
        </nav>
        {% endif %}
    </header>

    {% block content %}
    {% endblock %}

</body>

</html>
