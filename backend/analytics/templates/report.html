{% extends "base.html" %}

{% block content %}
<div class="container" id="reportContainer">
    <h2 style="margin-top: 0; color: var(--text-main);">Analysis Report</h2>
    <p style="color: var(--text-muted); font-size: 0.875rem;">
        Job ID: <span id="jobIdLabel"></span>
    </p>

    <div id="statusSection" class="loading" style="display: none;">
        Loading job results...
    </div>

    <div id="errorSection" class="result-box" style="display: none; border-left: 4px solid var(--danger);">
        <h3 style="color: var(--danger); margin-top: 0;">Processing Failed</h3>
        <p id="errorMessage" style="margin-bottom: 0; color: var(--text-muted);"></p>
        <button onclick="window.location.href='/'" style="margin-top: 1rem; background: var(--text-muted);">
            Return to Input Form
        </button>
    </div>

    <div id="resultsSection" style="display: none;">
        <div class="result-box">

            <div class="result-row">
                <span>Total Hours Work:</span>
                <span id="totalHours"></span>
            </div>

            <div class="result-row">
                <span>Overtime Hours:</span>
                <span id="overtimeHours" style="color: var(--warning);"></span>
            </div>

            <div class="result-row">
                <span>Estimated Pay:</span>
                <span id="estimatedPay" style="color: var(--success);">
                    Calculating...
                </span>
            </div>

            <div class="result-row">
                <span>Public Holidays (Week):</span>
                <span id="resHolidays"></span>
            </div>

            <div class="result-row">
                <span>Risk Level:</span>
                <span id="riskLevel" class="badge"></span>
            </div>

            <div class="result-row">
                <span>Compliance Status:</span>
                <span id="complianceStatus" class="badge"></span>
            </div>

        </div>

        <div style="margin-top: 1.5rem; padding: 1.25rem; background: #e0e7ff; border-radius: 0.75rem;">
            <h4>Recommendation</h4>
            <p id="resRecommendation"></p>
        </div>

        <button onclick="window.location.href='/'" style="margin-top: 2rem;">
            Assess Another Employee
        </button>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const urlParams = new URLSearchParams(window.location.search);
    const jobId = urlParams.get("job_id");

    if (!jobId) {
        window.location.href = "/";
        return;
    }

    document.getElementById("jobIdLabel").innerText = jobId;
    pollJobStatus(jobId);
});


async function pollJobStatus(jobId) {
    document.getElementById("statusSection").style.display = "block";

    try {
        const response = await fetch(
            `/api/v1/workforce/analyse-result?job_id=${jobId}`
        );

        const data = await response.json();

        if (data.status === "processing") {
            setTimeout(() => pollJobStatus(jobId), 3000);
        }

        else if (data.status === "completed") {
            document.getElementById("statusSection").style.display = "none";
            document.getElementById("resultsSection").style.display = "block";

            renderAnalytics(data.result);
            loadPayroll(data.result);
        }

        else {
            showError(data.error || "Job failed");
        }

    } catch (error) {
        showError("Could not connect to Analytics API.");
    }
}


function renderAnalytics(result) {
    document.getElementById("totalHours").innerText =
        `${result.total_hours} hrs`;

    document.getElementById("overtimeHours").innerText =
        `${result.overtime_hours} hrs`;

    document.getElementById("resHolidays").innerText =
        result.public_holidays_in_week;

    document.getElementById("riskLevel").innerText =
        result.risk_level;

    document.getElementById("complianceStatus").innerText =
        result.compliance_status;

    document.getElementById("resRecommendation").innerText =
        result.recommendation;
}


// 🔥 PAYROLL LAMBDA CALL
async function loadPayroll(result) {
    try {

        const payrollResponse = await fetch(
            "https://wwflt306x0.execute-api.us-east-1.amazonaws.com/default/rosterhub-payroll-calculator",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    employee_id: 1,
                    employee_name: "John",
                    hourly_rate: 20,
                    total_hours: parseFloat(result.total_hours),
                    standard_hours_limit: 40,
                    overtime_multiplier: 1.5
                })
            }
        );

        const payrollData = await payrollResponse.json();

        if (payrollData.success) {
            const grossPay = payrollData.data.gross_pay;

            document.getElementById("estimatedPay").innerText =
                `£${grossPay.toFixed(2)}`;
        } else {
            document.getElementById("estimatedPay").innerText =
                "Payroll calculation failed";
        }

    } catch (error) {
        document.getElementById("estimatedPay").innerText =
            "Payroll service unavailable";
    }
}


function showError(message) {
    document.getElementById("statusSection").style.display = "none";
    document.getElementById("errorSection").style.display = "block";
    document.getElementById("errorMessage").innerText = message;
}
</script>

{% endblock %}
