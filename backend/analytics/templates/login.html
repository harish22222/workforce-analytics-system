{% extends "base.html" %}

{% block content %}
<div class="container" style="max-width: 400px; margin-top: 4rem;">
    <h2 style="text-align: center; margin-bottom: 2rem; color: var(--text-main);">Sign In</h2>

    <form method="post">
        {% csrf_token %}

        <div class="form-group">
            <label for="id_username">Username</label>
            <input type="text" name="username" id="id_username" required autofocus>
        </div>

        <div class="form-group">
            <label for="id_password">Password</label>
            <input type="password" name="password" id="id_password" required>
        </div>

        {% if form.errors %}
        <div style="color: var(--danger); margin-bottom: 1rem; font-size: 0.875rem; text-align: center;">
            Invalid username or password. Please try again.
        </div>
        {% endif %}

        <button type="submit">Login</button>
    </form>
</div>
{% endblock %}
